name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: for f in *.sh; do bash -n "$f"; done

      - name: ShellCheck
        run: shellcheck notify.sh install.sh uninstall.sh update.sh

      - name: VERSION matches latest tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          file="$(tr -d '[:space:]' < VERSION)"
          test "$tag" = "$file" || { echo "Tag v$tag != VERSION ($file)"; exit 1; }
