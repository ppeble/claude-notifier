name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: for f in *.sh; do bash -n "$f"; done

      - name: ShellCheck
        run: shellcheck notify.sh install.sh uninstall.sh update.sh

      - name: VERSION matches latest tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          file="$(tr -d '[:space:]' < VERSION)"
          test "$tag" = "$file" || { echo "Tag v$tag != VERSION ($file)"; exit 1; }

  version-bump:
    name: Version bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a version bump + changelog entry
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          git fetch --quiet origin "$base" || true

          head_ver="$(tr -d '[:space:]' < VERSION)"
          [ -n "$head_ver" ] || { echo "::error::VERSION file is empty or missing."; exit 1; }

          base_ver="$(git show "$base:VERSION" 2>/dev/null | tr -d '[:space:]')" || base_ver=""
          [ -n "$base_ver" ] || base_ver="0.0.0"

          if [ "$base_ver" = "$head_ver" ]; then
            echo "::error::VERSION was not bumped (still $head_ver). Every change must bump VERSION."
            exit 1
          fi

          highest="$(printf '%s\n%s\n' "$base_ver" "$head_ver" | sort -V | tail -n1)"
          if [ "$highest" != "$head_ver" ]; then
            echo "::error::VERSION went backwards ($base_ver -> $head_ver). It must increase."
            exit 1
          fi

          ver_re="$(printf '%s' "$head_ver" | sed 's/\./\\./g')"
          if ! grep -qE "^##[[:space:]]+\[$ver_re\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$head_ver]' section. Document the bump."
            exit 1
          fi

          echo "OK: VERSION $base_ver -> $head_ver, with a CHANGELOG entry."

  tag:
    name: Tag release
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Tag vX.Y.Z when VERSION changed
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          [ -n "$ver" ] || { echo "::error::VERSION file is empty or missing."; exit 1; }

          # Previous commit's VERSION. HEAD~1 is the prior main tip for both
          # squash and merge commits. Empty on the very first commit.
          prev="$(git show HEAD~1:VERSION 2>/dev/null | tr -d '[:space:]')" || prev=""

          if [ "$prev" = "$ver" ]; then
            echo "VERSION unchanged ($ver); nothing to tag."
            exit 0
          fi

          if [ -n "$prev" ]; then
            highest="$(printf '%s\n%s\n' "$prev" "$ver" | sort -V | tail -n1)"
            if [ "$highest" != "$ver" ]; then
              echo "::warning::VERSION went backwards ($prev -> $ver); not tagging."
              exit 0
            fi
          fi

          tag="v$ver"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          echo "Created and pushed $tag."
